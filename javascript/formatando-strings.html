<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <style>
        body{
            font: normal 20px Arial;
        }
    </style>
    
    <script>
        let nome = prompt('Qual é o seu nome? ')
        document.write(`Olá ${nome}!!!, seu nome tem ${nome.length} letras. </br>`)
        document.write(`Seu nome em letras maiúsculas ${nome.toUpperCase()} </br>`)
        document.write(`Seu nome em letras minúsculas ${nome.toLowerCase()}`)

    </script>

</body>
</html>
